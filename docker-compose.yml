# ─────────────────────────────────────────────────────────────────────────────
# Jen - The Kea DHCP Management Console
# Docker Compose — External MySQL
#
# Use when connecting Jen to an existing MySQL/MariaDB server.
#
# Quick start:
#   cp .env.example .env
#   # Edit .env with your Kea and database details
#   docker compose up -d
#
# Config options (choose one):
#   A) Environment variables (recommended for Docker):
#      Fill in JEN_* vars in .env — config is auto-generated on first start
#
#   B) Mount your own jen.config:
#      Uncomment the jen.config volume line below and comment out env_file
# ─────────────────────────────────────────────────────────────────────────────

services:
  jen:
    build: .
    image: jen-dhcp:3.4.4
    container_name: jen
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-5050}:5050"
      - "${HTTPS_PORT:-8443}:8443"
    volumes:
      # Persistent config, certs, SSH keys, and backups
      - jen-config:/etc/jen
      # Persistent custom brand icons — survives container updates
      - jen-icons:/opt/jen/static/icons/custom
      # Option B: mount your own jen.config (uncomment to use)
      # - ./jen.config:/etc/jen/jen.config:ro
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5050/",
             "||", "curl", "-skf", "https://localhost:8443/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - jen-network

volumes:
  jen-config:
    name: jen-config
  jen-icons:
    name: jen-icons

networks:
  jen-network:
    name: jen-network
