<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Identity — Jen</title>
    <link rel="icon" href="/favicon.ico">
    <style>
        * { box-sizing:border-box; margin:0; padding:0; }
        body { background:#080c10; color:#e0e0e0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .bg-grid { position:fixed; top:0; left:0; width:100%; height:100%; background-image:linear-gradient(rgba(0,180,216,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,180,216,0.03) 1px,transparent 1px); background-size:40px 40px; z-index:0; }
        .card { position:relative; z-index:10; background:rgba(14,22,30,0.92); border:1px solid rgba(0,180,216,0.2); border-radius:12px; padding:40px; width:100%; max-width:420px; margin:20px; backdrop-filter:blur(20px); box-shadow:0 20px 60px rgba(0,0,0,0.6); }
        .logo { font-size:36px; font-weight:800; background:linear-gradient(135deg,#00b4d8,#0077b6,#48cae4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; text-align:center; margin-bottom:4px; }
        .subtitle { text-align:center; color:#4a6070; font-size:12px; margin-bottom:24px; }
        h2 { font-size:16px; font-weight:600; margin-bottom:4px; }
        .hint { color:#666; font-size:13px; margin-bottom:20px; }
        label { display:block; font-size:11px; font-weight:600; color:#4a8fa0; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
        input[type=text] { width:100%; background:rgba(0,180,216,0.04); border:1px solid rgba(0,180,216,0.15); border-radius:7px; color:#e0e0e0; padding:12px 14px; font-size:18px; letter-spacing:4px; text-align:center; outline:none; }
        input[type=text]:focus { border-color:rgba(0,180,216,0.5); }
        .btn { width:100%; padding:12px; background:linear-gradient(135deg,#0077b6,#00b4d8); border:none; border-radius:7px; color:#fff; font-size:14px; font-weight:600; cursor:pointer; margin-top:12px; }
        .btn:hover { opacity:0.9; }
        .btn-secondary { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#aaa; font-size:13px; }
        .alert { padding:10px 14px; border-radius:7px; margin-bottom:16px; font-size:13px; background:rgba(231,76,60,0.1); border:1px solid rgba(231,76,60,0.3); color:#e74c3c; }
        .divider { height:1px; background:linear-gradient(90deg,transparent,rgba(0,180,216,0.2),transparent); margin:20px 0; }
        .remember-group { margin-top:12px; }
        .remember-group label { text-transform:none; letter-spacing:0; font-size:13px; color:#aaa; display:flex; align-items:center; gap:8px; font-weight:400; }
        select { background:rgba(0,180,216,0.04); border:1px solid rgba(0,180,216,0.15); border-radius:6px; color:#e0e0e0; padding:6px 10px; font-size:13px; margin-left:4px; }
        .tab-bar { display:flex; gap:4px; margin-bottom:20px; }
        .tab { flex:1; padding:8px; text-align:center; border-radius:6px; font-size:12px; cursor:pointer; border:1px solid rgba(0,180,216,0.15); color:#666; background:transparent; }
        .tab.active { background:rgba(0,180,216,0.1); color:#00b4d8; border-color:rgba(0,180,216,0.4); }
        .user-badge { background:rgba(0,180,216,0.08); border:1px solid rgba(0,180,216,0.12); border-radius:20px; padding:4px 14px; font-size:12px; color:#4a8fa0; text-align:center; margin-bottom:20px; }
    </style>
    <script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('jen-theme')||'dark');})();</script>
</head>
<body>
<div class="bg-grid"></div>
<div class="card">
    <div class="logo">Jen</div>
    <div class="subtitle">The Kea DHCP Management Console</div>
    <div class="user-badge">🔐 Verifying: {{ username }}</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for cat, msg in messages %}<div class="alert">{{ msg }}</div>{% endfor %}{% endif %}
    {% endwith %}

    <div class="tab-bar">
        {% if has_totp %}
        <button class="tab active" onclick="showTab('totp', this)">🔢 Authenticator</button>
        {% endif %}
        <button class="tab {% if not has_totp %}active{% endif %}" onclick="showTab('backup', this)">🔑 Backup Code</button>
    </div>

    <!-- TOTP tab -->
    <div id="tab-totp" {% if not has_totp %}style="display:none"{% endif %}>
        <form method="POST">
            <input type="hidden" name="method" value="totp">
            <div class="form-group">
                <label>6-digit code from your authenticator app</label>
                <input type="text" name="code" maxlength="6" autocomplete="one-time-code"
                       inputmode="numeric" autofocus placeholder="000000">
            </div>
            <div class="remember-group">
                <label>
                    <input type="checkbox" name="remember_device" value="1" id="rememberCb" onchange="toggleRemember(this)">
                    Remember this device
                </label>
                <div id="rememberDays" style="display:none;margin-top:8px;">
                    <label>Remember for:
                        <select name="remember_device">
                            <option value="1">24 hours</option>
                            <option value="30" selected>30 days</option>
                            <option value="60">60 days</option>
                            <option value="90">90 days</option>
                            <option value="forever">Forever</option>
                        </select>
                    </label>
                </div>
            </div>
            <button type="submit" class="btn">Verify →</button>
        </form>
    </div>

    <!-- Backup code tab -->
    <div id="tab-backup" {% if has_totp %}style="display:none"{% endif %}>
        <form method="POST">
            <input type="hidden" name="method" value="backup">
            <div class="form-group">
                <label>Enter a backup recovery code</label>
                <input type="text" name="code" placeholder="XXXXXXXX-XXXXXXXX" autocomplete="off"
                       style="letter-spacing:2px;font-size:15px;">
            </div>
            <button type="submit" class="btn">Verify →</button>
        </form>
    </div>

    <div class="divider"></div>
    <a href="/login" style="display:block;text-align:center;color:#444;font-size:12px;text-decoration:none;">← Back to login</a>
</div>
<script>
function showTab(name, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    ['totp','backup'].forEach(t => {
        const el = document.getElementById('tab-' + t);
        if (el) el.style.display = t === name ? 'block' : 'none';
    });
}
function toggleRemember(cb) {
    document.getElementById('rememberDays').style.display = cb.checked ? 'block' : 'none';
}
// Auto-submit TOTP when 6 digits entered
document.querySelectorAll('input[inputmode=numeric]').forEach(inp => {
    inp.addEventListener('input', function() {
        if (this.value.replace(/\D/g,'').length === 6) {
            this.value = this.value.replace(/\D/g,'');
            this.closest('form').submit();
        }
    });
});
</script>
</body>
</html>
