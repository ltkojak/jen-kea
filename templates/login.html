<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jen — Sign In</title>
    <link rel="icon" href="/favicon.ico">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #080c10;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated binary/network background */
        .bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.18;
        }

        /* Subtle grid overlay */
        .bg-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            background-image:
                linear-gradient(rgba(0, 180, 216, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 180, 216, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Glow orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            z-index: 0;
        }
        .orb-1 {
            width: 500px; height: 500px;
            background: #00b4d8;
            top: -100px; left: -100px;
            animation: orb-drift 20s ease-in-out infinite alternate;
        }
        .orb-2 {
            width: 400px; height: 400px;
            background: #0077b6;
            bottom: -100px; right: -100px;
            animation: orb-drift 25s ease-in-out infinite alternate-reverse;
        }
        @keyframes orb-drift {
            from { transform: translate(0, 0); }
            to { transform: translate(40px, 30px); }
        }

        /* Login card */
        .login-wrap {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: rgba(14, 22, 30, 0.92);
            border: 1px solid rgba(0, 180, 216, 0.2);
            border-radius: 12px;
            padding: 44px 40px 36px;
            backdrop-filter: blur(20px);
            box-shadow:
                0 0 0 1px rgba(0,180,216,0.05),
                0 20px 60px rgba(0,0,0,0.6),
                0 0 40px rgba(0,180,216,0.05);
        }

        /* Logo */
        .logo-wrap {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-text {
            font-size: 52px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #00b4d8 0%, #0077b6 50%, #48cae4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            text-shadow: none;
            filter: drop-shadow(0 0 20px rgba(0,180,216,0.3));
        }

        .logo-sub {
            font-size: 11px;
            color: #4a6070;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 6px;
            font-weight: 500;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,180,216,0.2), transparent);
            margin: 0 -40px 28px;
        }

        /* Form */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #4a8fa0;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 7px;
        }

        input[type=text], input[type=password] {
            width: 100%;
            background: rgba(0, 180, 216, 0.04);
            border: 1px solid rgba(0, 180, 216, 0.15);
            border-radius: 7px;
            color: #e0e0e0;
            padding: 11px 14px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        input[type=text]:focus, input[type=password]:focus {
            border-color: rgba(0, 180, 216, 0.5);
            background: rgba(0, 180, 216, 0.07);
            box-shadow: 0 0 0 3px rgba(0,180,216,0.08);
        }

        input[type=text]::placeholder, input[type=password]::placeholder {
            color: #2a3a44;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0077b6, #00b4d8);
            border: none;
            border-radius: 7px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.3px;
        }

        .btn-login:hover { opacity: 0.9; }
        .btn-login:active { transform: scale(0.99); }

        /* Alert */
        .alert {
            padding: 10px 14px;
            border-radius: 7px;
            margin-bottom: 20px;
            font-size: 13px;
            border: 1px solid rgba(231,76,60,0.3);
            background: rgba(231,76,60,0.08);
            color: #e74c3c;
        }

        .alert-warning {
            border-color: rgba(243,156,18,0.3);
            background: rgba(243,156,18,0.08);
            color: #f39c12;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 24px;
        }

        .version-badge {
            display: inline-block;
            background: rgba(0,180,216,0.08);
            border: 1px solid rgba(0,180,216,0.12);
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 11px;
            color: #2a6070;
            font-family: 'SF Mono', 'Fira Code', monospace;
            letter-spacing: 0.3px;
        }

        /* Connection dots animation */
        .conn-dots {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin-bottom: 20px;
        }
        .conn-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: #00b4d8;
            opacity: 0.3;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        .conn-dot:nth-child(2) { animation-delay: 0.3s; }
        .conn-dot:nth-child(3) { animation-delay: 0.6s; }
        @keyframes pulse-dot {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.3); }
        }
    </style>
</head>
<body>
    <canvas class="bg-canvas" id="bgCanvas"></canvas>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-wrap">
        <div class="login-card">
            <div class="logo-wrap">
                <div class="conn-dots">
                    <div class="conn-dot"></div>
                    <div class="conn-dot"></div>
                    <div class="conn-dot"></div>
                </div>
                <div class="logo-text">Jen</div>
                <div class="logo-sub">The Kea DHCP Management Console</div>
            </div>

            <div class="divider"></div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert {% if category == 'warning' %}alert-warning{% endif %}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" autocomplete="on">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Enter username"
                           value="{{ prefill_username or '' }}"
                           autofocus autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter password"
                           autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login">Sign In →</button>
            </form>

            <div class="login-footer">
                <span class="version-badge">v{{ jen_version }}</span>
            </div>
        </div>
    </div>

    <script>
    // Binary rain / network packet background
    (function() {
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const chars = '01';
        const fontSize = 13;
        let columns;
        let drops = [];

        function init() {
            columns = Math.floor(canvas.width / fontSize);
            drops = Array(columns).fill(0).map(() => Math.random() * -100);
        }
        init();
        window.addEventListener('resize', init);

        function draw() {
            ctx.fillStyle = 'rgba(8, 12, 16, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const char = chars[Math.floor(Math.random() * chars.length)];
                const x = i * fontSize;
                const y = drops[i] * fontSize;

                // Vary brightness for depth effect
                const brightness = Math.random();
                if (brightness > 0.97) {
                    ctx.fillStyle = '#48cae4';
                } else if (brightness > 0.9) {
                    ctx.fillStyle = '#00b4d8';
                } else {
                    ctx.fillStyle = '#0d3a4a';
                }

                ctx.fillText(char, x, y);

                if (y > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i] += 0.3 + Math.random() * 0.2;
            }
        }

        setInterval(draw, 50);
    })();
    </script>
</body>
</html>
