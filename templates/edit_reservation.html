{% extends "base.html" %}
{% block title %}Edit Reservation{% endblock %}
{% block content %}
<div class="page-header">
    <h1>✏️ Edit Reservation</h1>
    <p>{{ host.ip }} — {{ host.mac }}</p>
</div>
<div class="card" style="max-width:600px;">
    <div style="background:var(--surface2);border-radius:var(--radius);padding:12px;margin-bottom:20px;font-size:12px;color:var(--text-muted);">
        IP address and MAC cannot be changed. Delete and recreate the reservation to change these.
    </div>
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label>IP Address</label>
                <input type="text" value="{{ host.ip }}" disabled style="opacity:0.5;">
            </div>
            <div class="form-group">
                <label>MAC Address</label>
                <input type="text" value="{{ host.mac }}" disabled style="opacity:0.5;">
            </div>
        </div>
        <div class="form-group">
            <label>Hostname</label>
            <input type="text" name="hostname" value="{{ host.hostname or '' }}">
        </div>
        <div class="form-group">
            <label>DNS Override</label>
            <input type="text" name="dns_override" value="{{ host.dns_override }}" placeholder="Leave blank for subnet default">
        </div>
        <div class="form-group">
            <label>Notes</label>
            <textarea name="notes" rows="2">{{ host.notes or '' }}</textarea>
        </div>
        <div style="display:flex;gap:8px;">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/reservations" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
