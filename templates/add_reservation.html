{% extends "base.html" %}
{% block title %}Add Reservation{% endblock %}
{% block content %}
<div class="page-header">
    <h1>📌 Add Reservation</h1>
</div>
<div class="card" style="max-width:600px;">
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label>Subnet *</label>
                <select name="subnet_id" required>
                    {% for sid, info in subnet_map.items() %}
                    <option value="{{ sid }}" {% if prefill and prefill.subnet_id|string == sid|string %}selected{% endif %}>{{ info.name }} — {{ info.cidr }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>IP Address *</label>
                <input type="text" name="ip" placeholder="x.x.x.x" value="{{ prefill.ip if prefill else '' }}" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>MAC Address *</label>
                <input type="text" name="mac" placeholder="aa:bb:cc:dd:ee:ff" value="{{ prefill.mac if prefill else '' }}" required>
            </div>
            <div class="form-group">
                <label>Hostname</label>
                <input type="text" name="hostname" placeholder="device-name" value="{{ prefill.hostname if prefill else '' }}">
            </div>
        </div>
        <div class="form-group">
            <label>DNS Override <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
            <input type="text" name="dns_override" placeholder="Leave blank for subnet default, e.g. 1.1.1.1, 8.8.8.8">
        </div>
        <div class="form-group">
            <label>Notes <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
            <textarea name="notes" rows="2" placeholder="Optional notes about this device..."></textarea>
        </div>
        <div style="display:flex;gap:8px;">
            <button type="submit" class="btn btn-primary">Add Reservation</button>
            <a href="/reservations" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
