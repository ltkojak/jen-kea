# ─────────────────────────────────────────────────────────────────────────────
# Jen - The Kea DHCP Management Console
# Docker Compose — Bundled MariaDB
#
# Use when you want Docker to manage the Jen database locally.
# The Kea database still connects to your external Kea server.
#
# Quick start:
#   cp .env.example .env
#   # Edit .env — set JEN_DB_HOST=jen-mysql
#   docker compose -f docker-compose.mysql.yml up -d
#
# Important: In .env, set JEN_DB_HOST=jen-mysql
# ─────────────────────────────────────────────────────────────────────────────

services:
  jen:
    build: .
    image: jen-dhcp:3.3.10
    container_name: jen
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-5050}:5050"
      - "${HTTPS_PORT:-8443}:8443"
    volumes:
      - jen-config:/etc/jen
      - jen-icons:/opt/jen/static/icons/custom
      # Option B: mount your own jen.config (uncomment to use)
      # - ./jen.config:/etc/jen/jen.config:ro
    env_file:
      - .env
    depends_on:
      jen-mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5050/",
             "||", "curl", "-skf", "https://localhost:8443/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - jen-network

  jen-mysql:
    image: mariadb:11
    container_name: jen-mysql
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme_root}
      MARIADB_DATABASE: jen
      MARIADB_USER: jen
      MARIADB_PASSWORD: ${JEN_MYSQL_PASSWORD:-changeme_jen}
    volumes:
      - jen-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - jen-network
    expose:
      - "3306"

volumes:
  jen-config:
    name: jen-config
  jen-mysql-data:
    name: jen-mysql-data
  jen-icons:
    name: jen-icons

networks:
  jen-network:
    name: jen-network
